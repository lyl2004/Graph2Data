[workspace]
name = "Graph2Data"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = ">=3.9,<3.13"
numpy = ">=1.24,<2.0"
pandas = ">=2.0,<3.0"
opencv = ">=4.8,<5.0"
scipy = ">=1.10,<2.0"
matplotlib = ">=3.7,<4.0"
plotly = ">=6.6.0,<7"
scikit-image = ">=0.21,<0.23"
pillow = ">=10.0,<11.0"
scikit-learn = ">=1.3,<2.0"
openpyxl = ">=3.1,<4.0"
python-multipart = ">=0.0.6"
shapely = ">=2.0,<3.0"
seaborn = ">=0.12,<0.14"
typing-extensions = ">=4.8,<5.0"
xlsxwriter = ">=3.1,<4.0"
pyinstaller = ">=6.18.0,<7"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
rapidocr-onnxruntime = ">=1.4.4, <2"
nicegui = ">=3.10.0, <4"
